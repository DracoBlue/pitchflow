name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Rechte für das Pages-Deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Immer nur ein Deployment gleichzeitig; laufende abbrechen.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # App läuft unter https://<user>.github.io/pitchflow/ — daher der basePath.
      NEXT_PUBLIC_BASE_PATH: /pitchflow
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      # _next-Ordner nicht von Jekyll verschlucken lassen.
      - run: touch out/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
